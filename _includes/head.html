<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>
    {% if page.url == "/index.html" %}
        {{ site.title }}
    {% else %}
        {{ page.title }} | {{ site.title }}
    {% endif %}
</title>
<meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
{% seo %}

<link rel="icon" type="image/png" href="{{ site.logo_img | prepend: site.baseurl }}">

<script>if (localStorage.getItem('dark')) document.documentElement.classList.add('dark');</script>

<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        },
        startup: {
            ready: function () {
                MathJax.startup.defaultReady();
                MathJax.startup.promise.then(function () {
                    var els = Array.from(document.querySelectorAll('mjx-container[display="true"]'));
                    els.reverse().forEach(function (el) {
                        var wrapper = document.createElement('div');
                        wrapper.className = 'math-display-block';
                        var p = el.closest('p');
                        if (p) {
                            p.after(wrapper);
                            wrapper.appendChild(el);
                            if (!p.textContent.trim()) p.remove();
                        } else {
                            el.replaceWith(wrapper);
                            wrapper.appendChild(el);
                        }
                    });
                });
            }
        }
    };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
